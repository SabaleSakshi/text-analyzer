services:
  mongo:
    image: mongo:7
    container_name: moderation-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ai-service:
    build:
      context: ./ai-service
    container_name: moderation-ai-service
    restart: unless-stopped
    environment:
      MODEL_PATH: app/models/best_model_v2.ckpt
      MODEL_NAME: roberta-base
      MAX_LEN: 128
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
        ]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 180s

  backend:
    build:
      context: ./backend
    container_name: moderation-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DATABASE_NAME: content_moderation_db
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "8001:8001"
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/', timeout=5)"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: moderation-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
